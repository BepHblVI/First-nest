version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: practice_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: practice_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: